<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Play Game</title>

<link rel="stylesheet" href="style.css">

<style>

.game-player{
width:100%;
height:90vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.game-player iframe{
width:90%;
height:100%;
border:none;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.back{
position:absolute;
top:20px;
left:20px;
background:white;
padding:10px 15px;
border-radius:20px;
text-decoration:none;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<h1 style="text-align:center;margin-top:20px;">🎮 Have Fun </h1>

<div class="game-player">

<iframe src="games/cooking/index.html"></iframe>

</div>

</body>

</html>
